name: Build Push Scan and Update FluxCD GitOps

on:
  push:
    branches:
      - main
      - dev

  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

      deploy_branch:
        description: "Application branch to deploy"
        required: true
        default: "dev"
        type: string

permissions:
  contents: read
  packages: write

env:
  APP_NAME: crchiran-portfolio
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/crchiran-portfolio
  GITOPS_REPO: crchiran/crchiran-portfolio-gitops
  GITOPS_BRANCH: main
  GITOPS_PATH: apps/crchiran-portfolio

jobs:
  build-push-scan-update-gitops:
    runs-on: ubuntu-latest

    concurrency:
      group: crchiran-portfolio-${{ github.event_name == 'workflow_dispatch' && inputs.deploy_env || github.ref_name }}
      cancel-in-progress: false

    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_env || github.ref_name == 'main' && 'prod' || 'dev' }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Validate manual deployment input
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail

          echo "Deploy environment: ${{ inputs.deploy_env }}"
          echo "Deploy branch: ${{ inputs.deploy_branch }}"

          if [[ "${{ inputs.deploy_env }}" == "prod" && "${{ inputs.deploy_branch }}" != "main" ]]; then
            echo "ERROR: prod deployment must use main branch."
            exit 1
          fi

      - name: Checkout application source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_branch || github.ref_name }}

      - name: Set deployment environment
        id: env
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DEPLOY_ENV="${{ inputs.deploy_env }}"
            DEPLOY_BRANCH="${{ inputs.deploy_branch }}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            DEPLOY_ENV="prod"
            DEPLOY_BRANCH="${GITHUB_REF_NAME}"
          else
            DEPLOY_ENV="dev"
            DEPLOY_BRANCH="${GITHUB_REF_NAME}"
          fi

          echo "DEPLOY_ENV=${DEPLOY_ENV}" >> "$GITHUB_OUTPUT"
          echo "DEPLOY_BRANCH=${DEPLOY_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Generate image tag
        id: vars
        run: |
          set -euo pipefail

          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          TIMESTAMP="$(date +'%Y%m%d-%H%M')"
          IMAGE_TAG="${{ steps.env.outputs.DEPLOY_ENV }}-${SHORT_SHA}-${TIMESTAMP}-${GITHUB_RUN_NUMBER}"

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          pull: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Checkout FluxCD GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Validate FluxCD Kustomize path
        run: |
          set -euo pipefail

          test -d "gitops/${GITOPS_PATH}"
          test -f "gitops/${GITOPS_PATH}/kustomization.yaml"

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.7.1"

      - name: Verify Kustomize
        run: |
          kustomize version

      - name: Update image tag in FluxCD GitOps repo
        working-directory: gitops/${{ env.GITOPS_PATH }}
        run: |
          set -euo pipefail

          kustomize edit set image "${APP_NAME}=${IMAGE_NAME}:${{ steps.vars.outputs.IMAGE_TAG }}"

      - name: Commit and push FluxCD GitOps changes
        working-directory: gitops
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add "${GITOPS_PATH}/kustomization.yaml"

          if git diff --cached --quiet; then
            echo "No GitOps changes to commit."
            exit 0
          fi

          git commit -m "Deploy ${APP_NAME} ${{ steps.vars.outputs.IMAGE_TAG }} to ${{ steps.env.outputs.DEPLOY_ENV }}"
          git push origin "${GITOPS_BRANCH}"

      - name: Summary
        run: |
          echo "### Build, Scan and FluxCD GitOps Update Completed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Application: \`${APP_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: \`${{ steps.env.outputs.DEPLOY_BRANCH }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Environment: \`${{ steps.env.outputs.DEPLOY_ENV }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: \`${IMAGE_NAME}:${{ steps.vars.outputs.IMAGE_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "GitOps Repo: \`${GITOPS_REPO}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "GitOps Path: \`${GITOPS_PATH}\`" >> "$GITHUB_STEP_SUMMARY"